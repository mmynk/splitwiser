<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splitwiser - Split Bills Wisely</title>
  <meta property="og:title" content="Splitwiser - Split Bills Wisely" />
  <meta property="og:description" content="Split bills fairly with item-level precision. Free and open source alternative to Splitwise." />
  <meta property="og:image" content="https://splitwiser.mmynk.com/splitwiser-og.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://splitwiser.mmynk.com" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header>
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <div>
          <h1>Splitwiser</h1>
        </div>
        <div id="user-info"></div>
      </div>
      <p>Split bills fairly</p>
    </header>

    <nav class="tab-nav">
      <a href="/" class="active">Bills</a>
      <a href="/groups.html">Groups</a>
      <a href="/friends.html">Friends</a>
    </nav>

    <!-- Balance Summary -->
    <section id="balance-section" class="hidden">
      <div class="balance-summary-cards">
        <div class="balance-summary-card owe">
          <div class="balance-summary-label">You owe</div>
          <div class="balance-summary-amount" id="total-you-owe">$0.00</div>
        </div>
        <div class="balance-summary-card owed">
          <div class="balance-summary-label">You're owed</div>
          <div class="balance-summary-amount" id="total-owed-to-you">$0.00</div>
        </div>
      </div>
      <div id="person-balances-list"></div>
    </section>

    <!-- My Bills -->
    <section id="my-bills-section">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>My Bills</h2>
        <button type="button" id="new-bill-btn" class="outline">+ New Bill</button>
      </div>
      <div id="my-bills-list"><em>Loading...</em></div>
    </section>

    <form id="bill-form" class="hidden">
      <!-- Bill Details -->
      <section>
        <h2>Bill Details</h2>
        <label>
          Bill Name <small>(optional - auto-generated if empty)</small>
          <input type="text" id="bill-title" placeholder="e.g., Team Lunch, Grocery Run">
          <small>Leave empty for auto-generated name like "Pizza - Alice, Bob"</small>
        </label>
        <label>
          Total (with tax)
          <input type="number" id="total" step="0.01" min="0" placeholder="0.00" required>
        </label>
      </section>

      <!-- Participants -->
      <section>
        <h2>Participants</h2>
        <div id="group-selector" class="hidden" style="margin-bottom: var(--spacing-md);">
          <label>
            Load from group
            <select id="group-select">
              <option value="">Select a group...</option>
            </select>
          </label>
        </div>
        <p class="hint">Press Enter to add a new participant</p>
        <div id="participants-list"></div>
        <button type="button" id="add-participant" class="secondary outline">+ Add Participant</button>
      </section>

      <!-- Payer Selection -->
      <section id="payer-section" class="hidden">
        <h2>Who paid this bill?</h2>
        <select id="payer-select">
          <option value="">Select payer...</option>
        </select>
      </section>

      <!-- Items (Optional) -->
      <section>
        <h2>Items <small>(optional)</small></h2>
        <p class="hint">Leave empty to split equally among all participants</p>
        <div id="subtotal-wrapper" class="hidden">
          <label>
            Subtotal (before tax)
            <input type="number" id="subtotal" step="0.01" min="0" placeholder="0.00">
            <small>Pre-tax total from your receipt</small>
          </label>
          <p id="tax-display" class="tax-display">Tax & Fees: <strong id="tax-amount">$0.00</strong></p>
        </div>
        <div id="items-list"></div>
        <button type="button" id="add-item" class="secondary outline">+ Add Item</button>
      </section>

      <!-- Actions -->
      <div class="actions">
        <button type="submit" id="calculate-btn">Calculate Split</button>
        <button type="button" id="save-btn" class="secondary">Save & Share</button>
      </div>
    </form>

    <!-- Results -->
    <section id="results" class="hidden">
      <h2>Split Results</h2>
      <div id="results-content"></div>
    </section>

    <!-- Error Display -->
    <div id="error" class="hidden"></div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
