# fly.toml app configuration file generated for mmynk-splitwiser on 2026-03-08T13:35:21-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mmynk-splitwiser'
primary_region = 'sjc'

[build]

[env]
  DB_PATH = '/app/data/bills.db'
  PORT = '8080'
  STATIC_PATH = '/app/frontend/static'

[[mounts]]
  source = 'data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

[metrics]
  port = 8080
  path = "/metrics"

[[vm]]
  size = 'shared-cpu-1x'
